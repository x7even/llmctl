        --cudagraph-capture-sizes 1 2 4 8 16 32
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── vLLM: Qwen3.6-35B-A3B FP8 — Fast profile (thinking OFF, max throughput) ─
  # Best for: quick lookups, chat, tasks where latency matters more than depth
  # Key difference: thinking disabled by default (no reasoning overhead)
  #   Custom template config/templates/qwen3.6-no-think.jinja inverts the default
  #   so thinking=off unless client explicitly passes enable_thinking=true
  # VRAM:    ~35 GB across 4 GPUs (~8.75 GB each) — full 0.97 utilisation
  # Benchmarked (thinking off): similar to baseline FP8 but faster TTFT; at conc=8
  #   ~400 tok/s decode (medium-256) with no think block overhead
  qwen3.6-35b-fast:
    name: "Qwen3.6-35B-A3B-FP8 (fast)"
    ttl: 0
    checkEndpoint: /health
    concurrencyLimit: 64
    aliases:
      - qwen3.6-fast
      - qwen3.6-nothin
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -v /home/xin/ai/llmstack/config/templates:/templates:ro
        -v /home/xin/ai/llmstack/.vllm-cache:/root/.cache/vllm
        -v /home/xin/ai/llmstack/.triton-cache:/root/.triton/cache
        -e HSA_ENABLE_SDMA=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        -e PYTORCH_TUNABLEOP_ENABLED=1
        -e PYTORCH_TUNABLEOP_FILENAME=/root/.cache/vllm/tunableop-${MODEL_ID}.csv
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/Qwen3.6-35B-A3B-FP8
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3.6-35b-fast
        --dtype auto
        --tensor-parallel-size 4
        --enable-expert-parallel
        --max-num-seqs 32
        --max-num-batched-tokens 32768
        --kv-cache-dtype fp8
        --gpu-memory-utilization 0.97
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --reasoning-parser qwen3
        --enable-auto-tool-choice
        --tool-call-parser qwen3_xml
