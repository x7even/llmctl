# llmstack model registry
# llama-swap docs: https://github.com/mostlygeek/llama-swap
#
# How routing works:
#   Client sends:  POST /v1/chat/completions  {"model": "qwen3-coder-30b-fp8", ...}
#   llama-swap:    looks up the profile, starts the backend if needed, proxies
#
# To add a model:
#   1. Add a new entry under `models:`
#   2. Set cmd to the podman run invocation (newlines = whitespace, ${PORT} is auto-assigned)
#   3. Set cmdStop to `podman stop llmstack-<backend>-${MODEL_ID}`
#   4. Run: llmctl list  (to verify it appears)
#      Then: llmctl swap <profile>  (to load and warm it up)
#
# Backend naming convention:
#   llmstack-vllm-<profile>   ← vLLM containers  (safetensors / FP8 / AWQ)
#   llmstack-llama-<profile>  ← llama-server containers  (GGUF)

healthCheckTimeout: 1200  # seconds; Gemma4 first-boot Triton compile ~18 min; warm starts ~2-3 min
startPort: 9100           # llama-swap assigns backends ports starting here
globalTTL: 0              # 0 = never auto-unload (set per-model below)

models:

  # ─── vLLM: Qwen3.6-27B FP8 (dense, code-optimised) ─────────────────────
  # Best for: code generation — highest quality in the Qwen3.6 family for code
  #           (SWE-bench 77.2 vs 35B-A3B's 73.4)
  # Backend: vLLM 0.22.1 via AMD official image
  # VRAM:    ~29 GB across 4 GPUs (~7.5 GB each) — dense model, no MoE sparsity
  # Note:    No MTP draft head; thinking ON by default
  qwen3.6-27b-fp8:
    name: "Qwen3.6-27B-FP8 (code)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 64
    aliases:
      - qwen3.6-27b
      - qwen3.6-dense
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -v /home/xin/ai/llmstack/.vllm-cache:/root/.cache/vllm
        -v /home/xin/ai/llmstack/.triton-cache:/root/.triton/cache
        -e HSA_ENABLE_SDMA=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        -e PYTORCH_TUNABLEOP_ENABLED=1
        -e PYTORCH_TUNABLEOP_FILENAME=/root/.cache/vllm/tunableop-${MODEL_ID}.csv
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/Qwen3.6-27B-FP8
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3.6-27b-fp8
        --dtype auto
        --tensor-parallel-size 4
        --max-num-seqs 32
        --max-num-batched-tokens 32768
        --kv-cache-dtype fp8
        --gpu-memory-utilization 0.92
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --reasoning-parser qwen3
        --enable-auto-tool-choice
        --tool-call-parser qwen3_xml
        --cudagraph-capture-sizes 1 2 4 8 16 32
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── vLLM: Qwen3.6-27B FP8 (code-optimised, MTP) ───────────────────────
  # Best for: code generation, agent tool calls, refactoring
  #           Highest SWE-bench in Qwen3.6 family (77.2 vs 35B-A3B 73.4)
  #           Dense 27B — all parameters active per token (vs 3B active for 35B MoE)
  # VRAM:    ~29 GB weights + ~85 GB BF16 KV pool across 4 GPUs
  # MTP:     Enabled via bundled mtp.safetensors — speculative 2 tokens ahead
  # Context: 131072 tokens (BF16 KV — no FP8 calibration, cold start ~5 min)
  qwen3.6-27b-code:
    name: "Qwen3.6-27B FP8 (code, MTP)"
    ttl: 0
    checkEndpoint: /health
    concurrencyLimit: 64
    aliases:
      - 27b-code
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -v /home/xin/ai/llmstack/.vllm-cache:/root/.cache/vllm
        -v /home/xin/ai/llmstack/.triton-cache:/root/.triton/cache
        -e HSA_ENABLE_SDMA=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        -e PYTORCH_TUNABLEOP_ENABLED=1
        -e PYTORCH_TUNABLEOP_FILENAME=/root/.cache/vllm/tunableop-${MODEL_ID}.csv
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/Qwen3.6-27B-FP8
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3.6-27b-code
        --dtype auto
        --tensor-parallel-size 4
        --max-model-len 131072
        --max-num-seqs 32
        --max-num-batched-tokens 32768
        --gpu-memory-utilization 0.95
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --reasoning-parser qwen3
        --enable-auto-tool-choice
        --tool-call-parser qwen3_xml
        --speculative-config '{"method": "mtp", "num_speculative_tokens": 2}'
        --cudagraph-capture-sizes 1 2 4 8 16 32
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── vLLM: Qwen3.6-27B BF16 (code-optimised, full precision) ───────────
  # Best for: highest quality code generation — full BF16 precision, zero quantization error
  #           Same SWE-bench architecture as -fp8 but no W8A8 approximation in dense layers
  #           Useful when FP8 kernel sub-optimality is suspected of affecting quality
  # VRAM:    ~54 GB weights + ~67 GB BF16 KV pool across 4 GPUs
  # Decode:  ~half tok/s vs FP8 variant (reads 2× weight bytes per step)
  #          No "sub-optimal FP8 kernel" warnings — BF16 GEMMs are fully tuned on ROCm/RDNA4
  # Context: 131072 tokens (BF16 KV, cold start ~5 min)
  # Weights: /mnt/models/llm/Qwen3.6-27B  (hf download Qwen/Qwen3.6-27B)
  qwen3.6-27b-code-f16:
    name: "Qwen3.6-27B BF16 (code, full precision)"
    ttl: 0
    checkEndpoint: /health
    concurrencyLimit: 32
    aliases:
      - 27b-f16
      - 27b-bf16
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -v /home/xin/ai/llmstack/.vllm-cache:/root/.cache/vllm
        -v /home/xin/ai/llmstack/.triton-cache:/root/.triton/cache
        -e HSA_ENABLE_SDMA=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        -e PYTORCH_TUNABLEOP_ENABLED=1
        -e PYTORCH_TUNABLEOP_FILENAME=/root/.cache/vllm/tunableop-${MODEL_ID}.csv
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/Qwen3.6-27B
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3.6-27b-code-f16
        --dtype auto
        --tensor-parallel-size 4
        --max-model-len 131072
        --max-num-seqs 32
        --max-num-batched-tokens 32768
        --gpu-memory-utilization 0.92
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --reasoning-parser qwen3
        --enable-auto-tool-choice
        --tool-call-parser qwen3_xml
        --speculative-config '{"method": "mtp", "num_speculative_tokens": 2}'
        --cudagraph-capture-sizes 1 2 4 8 16 32
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── llama-server: Qwen3.6-27B Q4_K_M GGUF ─────────────────────────────
  # Best for: code tasks where VRAM headroom matters; Q4 vs FP8 quality comparison
  # Backend: llama-server (Vulkan) across 4 R9700s
  # VRAM:    ~17 GB across 4 GPUs (~4.5 GB each) — leaves large KV cache headroom
  qwen3.6-27b-q4km:
    name: "Qwen3.6-27B (Q4_K_M)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 16
    aliases:
      - qwen3.6-27b-gguf
      - qwen3.6-27b-q4
    cmd: |
      podman run --replace --rm
        --name llmstack-llama-${MODEL_ID}
        --device=/dev/dri
        --group-add keep-groups
        --network=host
        -v /mnt/models/llm:/models:ro
        localhost/llmstack-llama:latest
        -m /models/unsloth/Qwen3.6-27B-GGUF/Qwen3.6-27B-Q4_K_M.gguf
        -ngl 999
        --tensor-split 1,1,1,1
        --host 127.0.0.1
        --port ${PORT}
        --ctx-size 32768
        --batch-size 1024
        --ubatch-size 512
        --parallel 8
        --cache-type-k q8_0
        --cache-type-v q8_0
        --jinja
    cmdStop: podman stop llmstack-llama-${MODEL_ID}

  # ─── vLLM: Qwen3-Coder-30B-A3B-Instruct FP8 ────────────────────────────
  # Best for: code generation, agent tool calls, Claude Code / OpenCode serving
  # Backend: vLLM 0.22.1 via docker.io/vllm/vllm-openai-rocm:latest (ROCm 7.2)
  # VRAM:    ~30 GB spread across 4 GPUs (~7.5 GB each)
  # Model:   /mnt/models/llm/Qwen3-Coder-30B-A3B-Instruct-FP8/  (safetensors, local)
  # Note:    No bundled MTP head (no speculative decoding)
  qwen3-coder-30b-fp8:
