        -v /home/xin/ai/llmstack/.vllm-cache:/root/.cache/vllm
        -v /home/xin/ai/llmstack/.triton-cache:/root/.triton/cache
        -e HSA_ENABLE_SDMA=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        -e PYTORCH_TUNABLEOP_ENABLED=1
        -e PYTORCH_TUNABLEOP_FILENAME=/root/.cache/vllm/tunableop-${MODEL_ID}.csv
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/Qwen3-Coder-30B-A3B-Instruct-FP8
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3-coder-30b-fp8
        --dtype auto
        --tensor-parallel-size 4
        --enable-expert-parallel
        --max-num-seqs 32
        --max-num-batched-tokens 32768
        --gpu-memory-utilization 0.97
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --cudagraph-capture-sizes 1 2 4 8 16 32
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── vLLM: Qwen3.6-35B-A3B AWQ Int4 ────────────────────────────────────
  # Best for: benchmarking Q4 vs FP8 quality/throughput tradeoff
  # Backend: vLLM 0.22.1 via AMD official image, AWQ quantization
  # VRAM:    ~20 GB across 4 GPUs (~5 GB each) — leaves headroom for large KV cache
  # Note:    No MTP head; no speculative decoding
  qwen3.6-35b-awq:
