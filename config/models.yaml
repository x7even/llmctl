  # ─── vLLM: Qwen3.6-35B-A3B FP8 — 512K context (YaRN RoPE extension) ────────
  # Best for: large codebase ingestion, long document analysis, repo-wide context
  # Context: 524288 tokens via YaRN RoPE scaling (factor=2.0 on native 262144 base)
  #   Tested: correct needle retrieval at 420K tokens ✓
  # VRAM:    ~35 GB model + KV cache for 512K fills VRAM quickly. With 4 GPUs @
  #   0.92 util each, ~26 GB available for KV. At BF16 KV, ~5.3M tokens capacity
  #   across the 10 full-attention layers — 512K should fit with room to spare.
  # MTP:     included; speculative head is small relative to the KV overhead
  # Warning: cold start slightly longer at 512K due to RoPE recalc on first load
  #          Do not use for short queries — full 262K ctx profile is more efficient
  qwen3.6-35b-512k:
    name: "Qwen3.6-35B-A3B-FP8 (512K context)"
    ttl: 0
    checkEndpoint: /health
    concurrencyLimit: 16
    aliases:
      - qwen3.6-512k
      - qwen3.6-long
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -v /home/xin/ai/llmstack/.vllm-cache:/root/.cache/vllm
        -v /home/xin/ai/llmstack/.triton-cache:/root/.triton/cache
        -e HSA_ENABLE_SDMA=0
        -e VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        -e PYTORCH_TUNABLEOP_ENABLED=1
        -e PYTORCH_TUNABLEOP_FILENAME=/root/.cache/vllm/tunableop-${MODEL_ID}.csv
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/Qwen3.6-35B-A3B-FP8
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3.6-35b-512k
        --dtype auto
        --tensor-parallel-size 4
        --enable-expert-parallel
        --max-num-seqs 16
        --max-num-batched-tokens 65536
        --max-model-len 524288
        --kv-cache-dtype fp8
        --gpu-memory-utilization 0.92
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --reasoning-parser qwen3
        --hf-overrides '{"text_config": {"rope_scaling": {"type": "yarn", "factor": 2.0, "original_max_position_embeddings": 262144}}}'
        --speculative-config '{"method": "mtp", "num_speculative_tokens": 2}'
        --cudagraph-capture-sizes 1 2 4 8 16 32
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── llama-server: Qwen3.6-35B-A3B GGUF UD-Q4_K_S (unsloth) ───────────
  # Best for: fast coding queries, lower latency than FP8 at low concurrency
  # Backend: llama-server Vulkan, single-file GGUF
  # VRAM:    ~20 GB across 4 GPUs (~5 GB each) — generous KV cache headroom
  # Model:   /mnt/models/llm/unsloth/Qwen3.6-35B-A3B-GGUF/
  qwen3.6-35b-q4ks:
    name: "Qwen3.6-35B-A3B (UD-Q4_K_S)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 12
    aliases:
      - qwen3.6-gguf
    cmd: |
      podman run --replace --rm
        --name llmstack-llama-${MODEL_ID}
        --device=/dev/dri
        --group-add keep-groups
        --network=host
        -v /mnt/models/llm:/models:ro
        localhost/llmstack-llama:latest
        -m /models/unsloth/Qwen3.6-35B-A3B-GGUF/Qwen3.6-35B-A3B-UD-Q4_K_S.gguf
        -ngl 999
        --tensor-split 1,1,1,1
        --host 127.0.0.1
        --port ${PORT}
        --ctx-size 32768
        --batch-size 1024
        --ubatch-size 512
        --parallel 8
        --cache-type-k q8_0
        --cache-type-v q8_0
        --jinja
    cmdStop: podman stop llmstack-llama-${MODEL_ID}

  # ─── llama-server: Qwen3.5-122B-A10B GGUF Q4_K_M ───────────────────────
  # Best for: highest quality reasoning, one-off heavyweight queries
  # Backend: llama-server (Vulkan) with tensor-split across 4 R9700s
  # VRAM:    ~73 GB across 4 GPUs (~18 GB each)
  # Note:    Cold start ~90s; lower concurrency than vLLM backends
  # Model:   /mnt/models/llm/lmstudio-community/Qwen3.5-122B-A10B-GGUF/  (split GGUF)
  qwen3.5-122b-a10b-q4:
    name: "Qwen3.5-122B-A10B (Q4_K_M)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 8
    aliases:
      - qwen3.5-122b
      - qwen3.5-122b-a10b
      - 122b
    cmd: |
      podman run --replace --rm
        --name llmstack-llama-qwen35-122b-q4
        --device=/dev/dri
        --group-add keep-groups
        --network=host
        -v /mnt/models/llm:/models:ro
        localhost/llmstack-llama:latest
        -m /models/lmstudio-community/Qwen3.5-122B-A10B-GGUF/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00002.gguf
        -ngl 999
        --tensor-split 1,1,1,1
        --host 127.0.0.1
        --port ${PORT}
        --ctx-size 32768
        --batch-size 512
        --ubatch-size 512
        --cache-type-k q8_0
        --cache-type-v q8_0
        --jinja
    cmdStop: podman stop llmstack-llama-qwen35-122b-q4

  # ─── llama-server: Qwen3.5-122B-A10B GGUF Q6_K ─────────────────────────
  # Higher quality variant (~98 GB) — tighter VRAM budget, limit context
  qwen3.5-122b-a10b-q6:
    name: "Qwen3.5-122B-A10B (Q6_K)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 6
    unlisted: false
    aliases:
      - qwen3.5-122b-q6
      - 122b-q6
    cmd: |
      podman run --replace --rm
        --name llmstack-llama-qwen35-122b-q6
        --device=/dev/dri
        --group-add keep-groups
        --network=host
        -v /mnt/models/llm:/models:ro
        localhost/llmstack-llama:latest
        -m /models/lmstudio-community/Qwen3.5-122B-A10B-GGUF/Qwen3.5-122B-A10B-Q6_K-00001-of-00003.gguf
        -ngl 999
        --tensor-split 1,1,1,1
        --host 127.0.0.1
        --port ${PORT}
        --ctx-size 16384
        --batch-size 512
        --ubatch-size 512
        --cache-type-k q8_0
        --cache-type-v q8_0
        --jinja
    cmdStop: podman stop llmstack-llama-qwen35-122b-q6

  # ─── llama-server: Gemma 4 26B-A4B Q8_0 GGUF (vision-capable) ──────────
  # Best for: multimodal tasks (image+text), strong general reasoning, vision QA
  # Only vision-capable profile in the stack — loads mmproj alongside the GGUF
  # Architecture: MoE with 26B total weights / 4B active params per token
  #   → fast decode despite Q8 size; comparable active-param cost to the Qwen3 MoEs
  # Backend: llama-server (Vulkan) — NOT vLLM (multimodal GGUF not supported in vLLM)
  # VRAM:    ~26 GB total ÷ 4 GPUs = ~6.5 GB each; generous KV cache headroom
  # Model:   /mnt/models/llm/lmstudio-community/gemma-4-26B-A4B-it-GGUF/
  gemma4-26b-q8:
    name: "Gemma 4 26B-A4B (Q8_0 + Vision)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 16
    aliases:
      - gemma4
      - gemma4-26b
      - gemma4-moe
      - gemma4-vision
    cmd: |
      podman run --replace --rm
        --name llmstack-llama-${MODEL_ID}
        --device=/dev/dri
        --group-add keep-groups
        --network=host
        -v /mnt/models/llm:/models:ro
        localhost/llmstack-llama:latest
        -m /models/lmstudio-community/gemma-4-26B-A4B-it-GGUF/gemma-4-26B-A4B-it-Q8_0.gguf
        --mmproj /models/lmstudio-community/gemma-4-26B-A4B-it-GGUF/mmproj-gemma-4-26B-A4B-it-BF16.gguf
        -ngl 999
        --tensor-split 1,1,1,1
        --host 127.0.0.1
        --port ${PORT}
        --ctx-size 32768
        --batch-size 1024
        --ubatch-size 512
        --parallel 16
        --cache-type-k q8_0
        --cache-type-v q8_0
        --jinja
    cmdStop: podman stop llmstack-llama-${MODEL_ID}

  # ─── llama-server: Gemma 4 12B Q4_K_M GGUF (lightweight vision) ─────────
  # Best for: quick vision tasks, low-latency image QA, VRAM-constrained use
  # Lowest VRAM footprint with vision capability in the stack
  # VRAM:    ~7 GB total ÷ 4 GPUs = ~1.75 GB each — can co-load with other models
  # Note:    Model not yet downloaded; path follows lmstudio-community convention
  gemma4-12b-q4:
    name: "Gemma 4 12B (Q4_K_M + Vision)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 16
    aliases:
      - gemma4-12b
      - gemma4-small
      - gemma4-fast
    cmd: |
      podman run --replace --rm
        --name llmstack-llama-${MODEL_ID}
        --device=/dev/dri
        --group-add keep-groups
        --network=host
        -v /mnt/models/llm:/models:ro
        localhost/llmstack-llama:latest
        -m /models/lmstudio-community/gemma-4-12B-it-GGUF/gemma-4-12B-it-Q4_K_M.gguf
        --mmproj /models/lmstudio-community/gemma-4-12B-it-GGUF/mmproj-gemma-4-12B-it-BF16.gguf
        -ngl 999
        --tensor-split 1,1,1,1
        --host 127.0.0.1
        --port ${PORT}
        --ctx-size 32768
        --batch-size 1024
        --ubatch-size 512
        --parallel 16
        --cache-type-k q8_0
        --cache-type-v q8_0
        --jinja
    cmdStop: podman stop llmstack-llama-${MODEL_ID}

  # ─── vLLM: Gemma 4 26B-A4B BF16 — high-concurrency agent serving ────────
  # Best for: concurrent agent workloads hitting Gemma 4 in parallel
  # Architecture: MoE, 26B total / 4B active params → fast decode at high concurrency
  # Backend: vLLM 0.22.1 via AMD official image (ROCm 7.2)
  # VRAM:    ~52 GB BF16 ÷ 4 GPUs = ~13 GB each; ~76 GB free for KV cache
  # Note:    No --reasoning-parser (Gemma 4 IT has no thinking mode by default)
  #          No --kv-cache-dtype fp8 (BF16 model; leave KV at default bf16)
  #          No --enable-expert-parallel (not tested/supported for Gemma 4 MoE on vLLM)
  #          No --speculative-config (no MTP head bundled with base checkpoint)
  #          --tool-call-parser gemma4: dedicated parser for Gemma 4's non-JSON
  #          wire format (<|tool_call>call:func{...}<tool_call|>) — NOT "pythonic"
  #          Model path: /models/google/gemma-4-26B-A4B-it (HF org/repo layout)
  #          Note: model not yet downloaded to /mnt/models/llm/google/
  gemma4-26b-a4b:
    name: "Gemma 4 26B-A4B (BF16, vLLM)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 32
    aliases:
      - gemma4-vllm
      - gemma4-concurrent
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -v /home/xin/ai/llmstack/.vllm-cache:/root/.cache/vllm
        -v /home/xin/ai/llmstack/.triton-cache:/root/.triton/cache
        -e HSA_ENABLE_SDMA=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        -e PYTORCH_TUNABLEOP_ENABLED=1
        -e PYTORCH_TUNABLEOP_FILENAME=/root/.cache/vllm/tunableop-${MODEL_ID}.csv
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/google/gemma-4-26B-A4B-it
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name gemma4-26b-a4b
        --dtype auto
        --tensor-parallel-size 4
        --max-num-seqs 32
        --max-num-batched-tokens 32768
        --gpu-memory-utilization 0.92
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --enable-auto-tool-choice
        --tool-call-parser gemma4
        --cudagraph-capture-sizes 1 2 4 8 16 32
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── vLLM: Gemma 4 26B-A4B FP8-Dynamic — long-context agent serving ─────
  # Best for: long-context coding sessions where O(N) attention is the bottleneck
  # Architecture: MoE (26B total / 128 experts / top_k=8 ≈ 4B active per token)
  #   Layer types: 25 sliding_attention (window=1024) + 5 full_attention (every 6th)
  #   At 20K context, reads only ~21% of KV vs a full-attention model of the same
  #   size — the 25 sliding layers always cost 1024 tokens regardless of ctx length
  # Backend: vLLM 0.22.1 via AMD official image (ROCm 7.2)
  # VRAM:    ~26 GB FP8 weights + BF16 KV cache across 4 GPUs
  # Source:  RedHatAI/gemma-4-26B-A4B-it-FP8-Dynamic (weights+activations FP8)
  # Note:    No --kv-cache-dtype fp8 (BF16 KV avoids calibration; ~2x VRAM per KV token)
  #          No --reasoning-parser (no thinking mode); --tool-call-parser gemma4
  #          No --enable-expert-parallel (not confirmed supported for Gemma 4 MoE)
  gemma4-26b-fp8:
    name: "Gemma 4 26B-A4B (FP8 weights, BF16 KV)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 32
    aliases:
      - gemma4-fp8
      - gemma4-fast-vllm
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -v /home/xin/ai/llmstack/.vllm-cache:/root/.cache/vllm
        -v /home/xin/ai/llmstack/.triton-cache:/root/.triton/cache
        -e HSA_ENABLE_SDMA=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        -e PYTORCH_TUNABLEOP_ENABLED=1
        -e PYTORCH_TUNABLEOP_FILENAME=/root/.cache/vllm/tunableop-${MODEL_ID}.csv
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/RedHatAI/gemma-4-26B-A4B-it-FP8-Dynamic
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name gemma4-26b-fp8
        --dtype auto
        --tensor-parallel-size 4
        --max-num-seqs 32
        --max-num-batched-tokens 32768
        --max-model-len 262144
        --gpu-memory-utilization 0.92
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --enable-auto-tool-choice
        --tool-call-parser gemma4
        --cudagraph-capture-sizes 1 2 4 8 16 32
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

