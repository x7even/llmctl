# llmstack model registry
# llama-swap docs: https://github.com/mostlygeek/llama-swap
#
# How routing works:
#   Client sends:  POST /v1/chat/completions  {"model": "qwen3-coder-30b-fp8", ...}
#   llama-swap:    looks up the profile, starts the backend if needed, proxies
#
# To add a model:
#   1. Add a new entry under `models:`
#   2. Set cmd to the podman run invocation (newlines = whitespace, ${PORT} is auto-assigned)
#   3. Set cmdStop to `podman stop llmstack-<backend>-${MODEL_ID}`
#   4. Run: llmctl list  (to verify it appears)
#      Then: llmctl swap <profile>  (to load and warm it up)
#
# Backend naming convention:
#   llmstack-vllm-<profile>   ← vLLM containers  (safetensors / FP8 / AWQ)
#   llmstack-llama-<profile>  ← llama-server containers  (GGUF)

healthCheckTimeout: 600   # seconds to wait for a model to become healthy on cold start (73 GB GGUF needs ~90-180 s)
startPort: 9100           # llama-swap assigns backends ports starting here
globalTTL: 0              # 0 = never auto-unload (set per-model below)

models:

  # ─── vLLM: Qwen3-Coder-30B-A3B-Instruct FP8 ────────────────────────────
  # Best for: code generation, agent tool calls, Claude Code / OpenCode serving
  # Backend: vLLM with TP=4 across all 4 R9700s
  # VRAM:    ~30 GB spread across 4 GPUs (~7.5 GB each)
  # Model:   /mnt/models/llm/Qwen3-Coder-30B-A3B-Instruct-FP8/  (safetensors, local)
  qwen3-coder-30b-fp8:
    name: "Qwen3-Coder-30B-A3B-Instruct-FP8"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 64
    aliases:
      - qwen3-coder
      - coder
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -e HSA_ENABLE_SDMA=0
        -e VLLM_ROCM_USE_AITER=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        localhost/llmstack-vllm:latest
        serve /models/Qwen3-Coder-30B-A3B-Instruct-FP8
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3-coder-30b-fp8
        --dtype auto
        --tensor-parallel-size 4
        --enable-expert-parallel
        --max-num-seqs 64
        --max-num-batched-tokens 32768
        --kv-cache-dtype fp8
        --gpu-memory-utilization 0.97
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── vLLM: Qwen3.6-35B-A3B FP8 — Code profile (quality-first + MTP) ────
  # Best for: Claude Code, OpenCode, agentic coding — highest quality output
  # Backend: vLLM 0.20.0 via docker.io/vllm/vllm-openai-rocm:latest (ROCm 7.2)
  # VRAM:    ~35 GB across 4 GPUs + ~3 GB MTP draft head overhead (~9.5 GB each)
  # MTP:     speculative decoding via bundled mtp.safetensors draft head
  #          Mathematically lossless — main model verifies all tokens
  #          Benchmarked: +25% serial (110→77 tok/s vs no-MTP), +52% at conc=8
  # Context: 262144 tokens native (hybrid linear+full attention — 75% O(n) layers)
  # Note:    thinking ON by default; --reasoning-parser strips <think> from content
  #          Uses AMD official image — Qwen3_5MoeForConditionalGeneration needs 0.20.0+
  qwen3.6-35b-code:
    name: "Qwen3.6-35B-A3B-FP8 (code)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 64
    aliases:
      - qwen3.6
      - qwen3.6-35b
      - qwen3.6-35b-fp8
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -e HSA_ENABLE_SDMA=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/Qwen3.6-35B-A3B-FP8
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3.6-35b-code
        --dtype auto
        --tensor-parallel-size 4
        --enable-expert-parallel
        --max-num-seqs 64
        --max-num-batched-tokens 32768
        --kv-cache-dtype fp8
        --gpu-memory-utilization 0.92
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --reasoning-parser qwen3
        --enable-auto-tool-choice
        --tool-call-parser qwen3_xml
        --speculative-config '{"method": "mtp", "num_speculative_tokens": 2}'
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── vLLM: Qwen3.6-35B-A3B FP8 — Fast profile (thinking OFF, max throughput) ─
  # Best for: quick lookups, chat, tasks where latency matters more than depth
  # Key difference: thinking disabled by default (no reasoning overhead)
  #   Custom template config/templates/qwen3.6-no-think.jinja inverts the default
  #   so thinking=off unless client explicitly passes enable_thinking=true
  # VRAM:    ~35 GB across 4 GPUs (~8.75 GB each) — full 0.97 utilisation
  # Benchmarked (thinking off): similar to baseline FP8 but faster TTFT; at conc=8
  #   ~400 tok/s decode (medium-256) with no think block overhead
  qwen3.6-35b-fast:
    name: "Qwen3.6-35B-A3B-FP8 (fast)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 64
    aliases:
      - qwen3.6-fast
      - qwen3.6-nothin
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -v ~/ai/llmstack/config/templates:/templates:ro
        -e HSA_ENABLE_SDMA=0
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/Qwen3.6-35B-A3B-FP8
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3.6-35b-fast
        --dtype auto
        --tensor-parallel-size 4
        --enable-expert-parallel
        --max-num-seqs 64
        --max-num-batched-tokens 32768
        --kv-cache-dtype fp8
        --gpu-memory-utilization 0.97
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --reasoning-parser qwen3
        --enable-auto-tool-choice
        --tool-call-parser qwen3_xml
        --chat-template /templates/qwen3.6-no-think.jinja
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── vLLM: Qwen3.6-35B-A3B FP8 — 512K context (YaRN RoPE extension) ────────
  # Best for: large codebase ingestion, long document analysis, repo-wide context
  # Context: 524288 tokens via YaRN RoPE scaling (factor=2.0 on native 262144 base)
  #   Tested: correct needle retrieval at 420K tokens ✓
  # VRAM:    ~35 GB model + KV cache for 512K fills VRAM quickly. With 4 GPUs @
  #   0.92 util each, ~26 GB available for KV. At BF16 KV, ~5.3M tokens capacity
  #   across the 10 full-attention layers — 512K should fit with room to spare.
  # MTP:     included; speculative head is small relative to the KV overhead
  # Warning: cold start slightly longer at 512K due to RoPE recalc on first load
  #          Do not use for short queries — full 262K ctx profile is more efficient
  qwen3.6-35b-512k:
    name: "Qwen3.6-35B-A3B-FP8 (512K context)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 16
    aliases:
      - qwen3.6-512k
      - qwen3.6-long
    cmd: |
      podman run --replace --rm
        --name llmstack-vllm-${MODEL_ID}
        --device=/dev/kfd
        --device=/dev/dri
        --group-add keep-groups
        --security-opt seccomp=unconfined
        --security-opt apparmor=unconfined
        --ipc=private
        --shm-size=32g
        --network=host
        -v /mnt/models/llm:/models:ro
        -e HSA_ENABLE_SDMA=0
        -e VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
        -e TORCH_BLAS_PREFER_HIPBLASLT=1
        --entrypoint=""
        docker.io/vllm/vllm-openai-rocm:latest
        vllm serve /models/Qwen3.6-35B-A3B-FP8
        --host 127.0.0.1
        --port ${PORT}
        --served-model-name qwen3.6-35b-512k
        --dtype auto
        --tensor-parallel-size 4
        --enable-expert-parallel
        --max-num-seqs 16
        --max-num-batched-tokens 65536
        --max-model-len 524288
        --kv-cache-dtype fp8
        --gpu-memory-utilization 0.92
        --enable-prefix-caching
        --enable-chunked-prefill
        --trust-remote-code
        --reasoning-parser qwen3
        --hf-overrides '{"text_config": {"rope_scaling": {"type": "yarn", "factor": 2.0, "original_max_position_embeddings": 262144}}}'
        --speculative-config '{"method": "mtp", "num_speculative_tokens": 2}'
    cmdStop: podman stop llmstack-vllm-${MODEL_ID}

  # ─── llama-server: Qwen3.6-35B-A3B GGUF UD-Q4_K_S (unsloth) ───────────
  # Best for: fast coding queries, lower latency than FP8 at low concurrency
  # Backend: llama-server Vulkan, single-file GGUF
  # VRAM:    ~20 GB across 4 GPUs (~5 GB each) — generous KV cache headroom
  # Model:   /mnt/models/llm/unsloth/Qwen3.6-35B-A3B-GGUF/
  qwen3.6-35b-q4ks:
    name: "Qwen3.6-35B-A3B (UD-Q4_K_S)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 12
    aliases:
      - qwen3.6-gguf
    cmd: |
      podman run --replace --rm
        --name llmstack-llama-${MODEL_ID}
        --device=/dev/dri
        --group-add keep-groups
        --network=host
        -v /mnt/models/llm:/models:ro
        localhost/llmstack-llama:latest
        -m /models/unsloth/Qwen3.6-35B-A3B-GGUF/Qwen3.6-35B-A3B-UD-Q4_K_S.gguf
        -ngl 999
        --tensor-split 1,1,1,1
        --host 127.0.0.1
        --port ${PORT}
        --ctx-size 32768
        --batch-size 1024
        --ubatch-size 512
        --parallel 8
        --cache-type-k q8_0
        --cache-type-v q8_0
        --jinja
    cmdStop: podman stop llmstack-llama-${MODEL_ID}

  # ─── llama-server: Qwen3.5-122B-A10B GGUF Q4_K_M ───────────────────────
  # Best for: highest quality reasoning, one-off heavyweight queries
  # Backend: llama-server (Vulkan) with tensor-split across 4 R9700s
  # VRAM:    ~73 GB across 4 GPUs (~18 GB each)
  # Note:    Cold start ~90s; lower concurrency than vLLM backends
  # Model:   /mnt/models/llm/lmstudio-community/Qwen3.5-122B-A10B-GGUF/  (split GGUF)
  qwen3.5-122b-a10b-q4:
    name: "Qwen3.5-122B-A10B (Q4_K_M)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 8
    aliases:
      - qwen3.5-122b
      - qwen3.5-122b-a10b
      - 122b
    cmd: |
      podman run --replace --rm
        --name llmstack-llama-qwen35-122b-q4
        --device=/dev/dri
        --group-add keep-groups
        --network=host
        -v /mnt/models/llm:/models:ro
        localhost/llmstack-llama:latest
        -m /models/lmstudio-community/Qwen3.5-122B-A10B-GGUF/Qwen3.5-122B-A10B-Q4_K_M-00001-of-00002.gguf
        -ngl 999
        --tensor-split 1,1,1,1
        --host 127.0.0.1
        --port ${PORT}
        --ctx-size 32768
        --batch-size 512
        --ubatch-size 512
        --cache-type-k q8_0
        --cache-type-v q8_0
        --jinja
    cmdStop: podman stop llmstack-llama-qwen35-122b-q4

  # ─── llama-server: Qwen3.5-122B-A10B GGUF Q6_K ─────────────────────────
  # Higher quality variant (~98 GB) — tighter VRAM budget, limit context
  qwen3.5-122b-a10b-q6:
    name: "Qwen3.5-122B-A10B (Q6_K)"
    ttl: 600
    checkEndpoint: /health
    concurrencyLimit: 6
    unlisted: false
    aliases:
      - qwen3.5-122b-q6
      - 122b-q6
    cmd: |
      podman run --replace --rm
        --name llmstack-llama-qwen35-122b-q6
        --device=/dev/dri
        --group-add keep-groups
        --network=host
        -v /mnt/models/llm:/models:ro
        localhost/llmstack-llama:latest
        -m /models/lmstudio-community/Qwen3.5-122B-A10B-GGUF/Qwen3.5-122B-A10B-Q6_K-00001-of-00003.gguf
        -ngl 999
        --tensor-split 1,1,1,1
        --host 127.0.0.1
        --port ${PORT}
        --ctx-size 16384
        --batch-size 512
        --ubatch-size 512
        --cache-type-k q8_0
        --cache-type-v q8_0
        --jinja
    cmdStop: podman stop llmstack-llama-qwen35-122b-q6

