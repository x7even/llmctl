        --served-model-name qwen3.6-35b-code
        --dtype auto
        --tensor-parallel-size 4
        --enable-expert-parallel
        --max-num-seqs 32
        --max-num-batched-tokens 32768
        --max-model-len 131072
        --gpu-memory-utilization 0.92
        --enable-prefix-caching
